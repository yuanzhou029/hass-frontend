name: "安全漏洞扫描"

on:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        language: ["javascript"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 2

      # 移除 PR 相关逻辑，只保留 push 扫描
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4.32.6
        with:
          languages: ${{ matrix.language }}

      # 移除 autbuild（JavaScript 项目通常不需要）
      # - name: Autobuild
      #   uses: github/codeql-action/autobuild@v4.32.6

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4.32.6
  
  cleanup-workflow-runs:
    runs-on: ubuntu-latest
    needs: analyze

    steps:
      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Delete completed workflow runs
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          echo "Fetching completed workflow runs..."
          RUN_IDS=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs?per_page=100" \
            | jq '.workflow_runs[] | select(.status == "completed") | .id')
          for run_id in $RUN_IDS; do
            echo "Deleting run ID: $run_id"
            curl -s -X DELETE -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/actions/runs/$run_id"
          done